name: CI -Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Mensaje inicial
        run: echo "Iniciando workflows de CI"

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Verificar la version de .NET
        run: dotnet --version